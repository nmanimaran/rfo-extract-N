<body><h2>227.304-70 Reporting.</h2>
<div class="body conbody"><p class="p">Interim and final invention reports and notification of all subcontracts for experimental, developmental, or research work may be submitted on DD Form 882, Report of Inventions and Subcontracts.</p></div>

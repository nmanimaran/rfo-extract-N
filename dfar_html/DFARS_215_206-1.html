<body><h2>215.206-1 Preaward notices.</h2>
<div class="body conbody"><p class="p">If the Government exercises the authority provided in 240.271-6, the notifications to unsuccessful offerors must not reveal any information that is determined to be withheld from disclosure in accordance with 10 U.S.C. 3252 (see subpart 240.271).</p></div>

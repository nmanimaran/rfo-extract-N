<body><h2>223.7202 Preaward responsibilities.</h2>
<div class="body conbody"><p class="p">When an acquisition involves AA&amp;E, technical or requirements personnel must specify in the purchase request—</p>
<p class="p">(a) That AA&amp;E is involved; and</p>
<p class="p">(b) Which physical security requirements of DoD Manual 5100.76 apply.</p></div>

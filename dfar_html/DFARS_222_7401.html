<body><h2>222.7401 Definition.</h2>
<div class="body conbody"><p class="p">As used in this subpart— <em>Covered subcontractor</em>, means any entity that has a subcontract valued in excess of $1 million, except a subcontract for the acquisition of commercial products or commercial services, including commercially available off-the-shelf items.</p></div>

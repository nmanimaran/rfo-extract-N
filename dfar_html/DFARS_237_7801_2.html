<body><h2>237.7801 Definition.</h2>
<div class="body conbody"><p class="p">As used in this subpart— “Contract working dog,”  means a dog that—</p>
<p class="p">(1) Performs a service for DoD pursuant to a contract; and</p>
<p class="p">(2) Is trained and kenneled by an entity that provides such a dog pursuant to such a contract.</p></div>

<body><h2>225.802-70 Contracts for performance outside the United States and Canada.</h2>
<div class="body conbody"><p class="p">Follow the procedures at PGI 225.802-70 when placing a contract requiring performance outside the United States and Canada.  See also subpart 225.7, Contracts Performed Outside the United States.</p></div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>232.501-1 Customary progress payment rates</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .content table {
            white-space: normal;
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }
        .content table th,
        .content table td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: left;
            vertical-align: top;
        }
        .content table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>232.501-1 Customary progress payment rates</h1>
    <div class="content">(a)  The customary progress payment rates for DoD contracts, including contracts 
that contain foreign military sales (FMS) requirements, are 80 percent for large 
business concerns and 90 percent for small business concerns.</div>
</body>
</html>

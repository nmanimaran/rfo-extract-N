<body><h2>204.202-74 Traceability of Appropriations.</h2>
<div class="body conbody"><p class="p">Accounting classification reference numbers (ACRNs) ensure traceability of funds from accounting systems to contract actions.  Follow the procedures at PGI 204.202- 74 for use of ACRNs.</p></div>

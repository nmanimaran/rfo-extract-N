<body><h2>225.7022-4 Exceptions.</h2>
<div class="body conbody"><p class="p">The prohibition at 225.7022-3 does not apply to—</p>
<p class="p">(a)  Purchases under the micro-purchase threshold made using the Governmentwide commercial purchase card; or</p>
<p class="p">(b)  Purchases using the SF 44 in accordance with 213.306.</p></div>

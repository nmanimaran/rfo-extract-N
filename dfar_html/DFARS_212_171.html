<body><h2>212.171 Limitation on acquisition of right-hand drive passenger sedans.</h2>
<div class="body conbody"><p class="p">10 U.S.C. 2253(a)(2) limits the authority to purchase right-hand drive passenger sedans to a cost of not more than $55,000 per vehicle.</p></div>

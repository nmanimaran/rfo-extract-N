<body><h2>225.7101 Definitions.</h2>
<div class="body conbody"><p class="p">As used in this subpart— “Component” means any item supplied to the Government as part of an end product or of another component. “Domestic manufacture” means manufactured in the United States, its outlying areas; or Canada.</p></div>

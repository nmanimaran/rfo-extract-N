<body><h2>232.404 Exclusions.</h2>
<div class="body conbody"><p class="p">(a)(9)  The requirements of FAR Subpart 32.4 do not apply to advertisements in high school and college publications for military recruitment efforts under 10 U.S.C. 503 when the contract cost does not exceed the micro-purchase threshold.</p></div>

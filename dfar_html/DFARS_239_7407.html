<body><h2>239.7407 Type of contract.</h2>
<div class="body conbody"><p class="p">When acquiring telecommunications services, the contracting officer may use a basic agreement (see FAR 16.702) in conjunction with communication service authorizations.  When using this method, follow the procedures at PGI 239.7407.</p></div>

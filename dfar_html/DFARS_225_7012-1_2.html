<body><h2>225.7012-1 Restriction.</h2>
<div class="body conbody"><p class="p">In accordance with Section 8112 of Public Law 100-202, and similar sections in subsequent DoD appropriations acts, do not purchase a supercomputer unless it is manufactured in the United States.</p></div>

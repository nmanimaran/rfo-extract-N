<body><h2>228.105 Other types of bonds.</h2>
<div class="body conbody"><p class="p">Fidelity and forgery bonds generally are not required but are authorized for use when—</p>
<p class="p">(1)  Necessary for the protection of the Government or the contractor; or</p>
<p class="p">(2)  The investigative and claims services of a surety company are desired.</p></div>

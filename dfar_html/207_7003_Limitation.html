<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>207.7003 Limitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .content table {
            white-space: normal;
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }
        .content table th,
        .content table td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: left;
            vertical-align: top;
        }
        .content table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>207.7003 Limitation</h1>
    <div class="content">In accordance with 10 U.S.C. 3069, the acquisition of additional quantities is limited to 
not more than 10 percent of the quantity approved in the justification and approval of 
the use of other than competitive procedures prepared in accordance with FAR Part 6.</div>
</body>
</html>

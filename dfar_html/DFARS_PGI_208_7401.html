<body><h2>PGI 208.7401 Definitions.</h2>
<div class="body conbody"><p class="p">As used in this subpart— “Golden Disk” means a purchased license or entitlement to distribute an unlimited or bulk number of copies of software throughout DoD. “Software product manager” means the Government official who manages an enterprise software agreement.</p></div>

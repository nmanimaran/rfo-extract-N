<body><h2>242.505-2 Auditor determination procedure.</h2>
<div class="body conbody"><p class="p">(b)  <em>Procedures.</em></p>
<p class="p" style="padding-left: 2em">(2)(iii)  When agreement cannot be reached with the contractor, the auditor will issue a DCAA Form 1, Notice of Contract Costs Suspended and/or Disapproved, in addition to the advisory report to the administrative contracting officer.</p></div>

<body><h2>225.7015 Restriction on overseas architect-engineer services.</h2>
<div class="body conbody"><p class="p">For restriction on award of architect-engineer contracts to be performed in Japan, in any North Atlantic Treaty Organization member country, or in countries bordering the Arabian Gulf, see 236.602-70.</p></div>

<body><h2>240.7004-1 Definition.</h2>
<div class="body conbody"><p class="p">As used in this section— <em>State sponsor of terrorism</em>  is defined in the provision at 252.225-7050, Disclosure of Ownership or Control by the Government of a Country that is a State Sponsor of Terrorism.</p></div>

<body><h2>245.103-72 Government-furnished property attachments to solicitations and awards.</h2>
<div class="body conbody"><p class="p">When performance will require the use of GFP, contracting officers must include the GFP attachment to solicitations and awards.  See PGI 245.103-72 for procedures and helpful links.</p></div>

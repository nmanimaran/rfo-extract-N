<body><h2>232.703-70 Military construction appropriations act restriction.</h2>
<div class="body conbody"><p class="p">Annual military construction appropriations acts restrict the use of funds appropriated by the acts for payments under cost-plus-fixed-fee contracts (see 216.304-2).</p></div>

<body><h2>225.7602 Procedures.</h2>
<div class="body conbody"><p class="p">For contracts awarded to the Canadian Commercial Corporation (CCC), the CCC will submit a certification from its proposed subcontractor with the other required precontractual information (see 225.870).</p></div>

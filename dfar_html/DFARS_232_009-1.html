<body><h2>232.009-1 General.</h2>
<div class="body conbody"><p class="p">10 U.S.C. 3801(b) requires DoD to provide accelerated payments to small business contractors and subcontractors, to the fullest extent permitted by law, with a goal of 15 days.</p></div>

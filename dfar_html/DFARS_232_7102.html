<body><h2>232.7102 Contract clause.</h2>
<div class="body conbody"><p class="p">Insert the clause at 252.232-7010, Levies on Contract Payments, in all solicitations and contracts, including solicitations and contracts using FAR part 12 procedures for the acquisition of commercial products and commercial services.</p></div>

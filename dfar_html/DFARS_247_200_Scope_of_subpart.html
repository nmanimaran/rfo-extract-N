<!DOCTYPE html>

    <title>247.200 Scope of subpart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;

        }
        h1 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .content table {
            white-space: normal;

            margin: 12px 0;
        }
        .content table th,
        .content table td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: left;
            vertical-align: top;
        }
        .content table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }

</head>
<body>
    <h1>247.200 Scope of subpart</h1>
    <div class="content">This subpart does not apply to the operation of vessels owned by, or bareboat chartered

transportation or related services.

<strong>247.206  [Reserved] </strong></div>

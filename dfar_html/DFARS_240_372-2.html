<body><h2>240.372-2 Responsibilities of contracting officers.</h2>
<div class="body conbody"><p class="p">(a)  Contracting officers must ensure that solicitations comply with PGI 240.372- 2(1).</p>
<p class="p">(b)  For additional guidance on determining a project to be fundamental research in accordance with 252.204-7000(a)(3), see PGI 240.372-2(2).</p></div>

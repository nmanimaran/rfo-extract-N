<body><h2>215.110 Solicitation provisions and contract clauses.</h2>
<div class="body conbody"><p class="p">(a)(1)  For source selections when the procurement is valued at $100 million or more, contracting officers should use the provision at FAR 52.215-1, Instructions to Offerors—Competitive Acquisition, with its Alternate I.</p></div>

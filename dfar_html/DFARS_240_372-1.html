<body><h2>240.372-1 General.</h2>
<div class="body conbody"><p class="p">DoD employees or members of the Armed Forces who are assigned to or visiting a contractor facility and are engaged in oversight of an acquisition program will retain control of their work products, both classified and unclassified (see PGI 240.372-1).</p></div>

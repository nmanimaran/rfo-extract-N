<body><h2>252.225-7015 Restriction on Acquisition of Hand or Measuring Tools.</h2>
<div class="body conbody"><p class="p">As prescribed in 225.7002-3(b), use the following clause: (JUN 2005) Hand or measuring tools delivered under this contract shall be produced in the United States or its outlying areas. (End of clause)</p></div>

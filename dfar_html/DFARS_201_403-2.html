<body><h2>201.403-2 Appointment.</h2>
<div class="body conbody"><p class="p">(a)  Certificates of Appointment executed under the Defense Acquisition Regulation have the same effect as if they had been issued under FAR.</p>
<p class="p">(b)  Agency heads may delegate the purchase authority in 213.301 to DoD civilian employees and members of the U.S. Armed Forces.</p></div>

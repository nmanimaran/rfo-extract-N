<body><h2>226.7101 Definition.</h2>
<div class="body conbody"><p class="p">“Vicinity,” as used in this subpart, means the county or counties in which the military installation to be closed or realigned is located and all adjacent counties, unless otherwise defined by the agency head.</p></div>

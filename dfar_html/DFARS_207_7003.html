<body><h2>207.7003 Limitation.</h2>
<div class="body conbody"><p class="p">In accordance with 10 U.S.C. 3069, the acquisition of additional quantities is limited to not more than 10 percent of the quantity approved in the justification and approval of the use of other than competitive procedures prepared in accordance with FAR Part 6.</p></div>

<body><h2>235.001 Definitions.</h2>
<div class="body conbody"><p class="p">“Research and development” means those efforts described by the Research, Development, Test, and Evaluation (RDT&amp;E) budget activity definitions found in the DoD Financial Management Regulation (DoD 7000.14-R), Volume 2B, Chapter 5.</p></div>

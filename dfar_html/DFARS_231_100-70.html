<body><h2>231.100-70 Contract clause.</h2>
<div class="body conbody"><p class="p">Use the clause at 252.231-7000, Supplemental Cost Principles, in all solicitations and contracts, which are subject to the principles and procedures described in FAR Subparts 31.1, 31.2, 31.6, and 31.7.</p></div>

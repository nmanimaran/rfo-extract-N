<body><h2>237.870-1 Scope.</h2>
<div class="body conbody"><p class="p">This section—</p>
<p class="p">(a)  Implements 10 U.S.C. 4501; and</p>
<p class="p">(b)  Applies to services acquired for DoD, regardless of whether the services are acquired through—</p>
<p class="p" style="padding-left: 2em">(1)  A DoD contract or task order; or</p>
<p class="p" style="padding-left: 2em">(2)  A contract or task order awarded by an agency other than DoD.</p></div>

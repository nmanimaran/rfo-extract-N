<body><h2>223.7105 Reimbursement.</h2>
<div class="body conbody"><p class="p">The Secretary of Defense may assess a charge for any storage or disposal provided under this subpart. If a charge is assessed, then the contract must identify the assessment with payment to the Government on a reimbursable cost basis.</p></div>

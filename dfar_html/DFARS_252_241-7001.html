<body><h2>252.241-7001 Government Access.</h2>
<div class="body conbody"><p class="p">As prescribed in 241.501-70(b), use the following clause: GOVERNMENT ACCESS (DEC 1991) Authorized representatives of the Government may have access to the Contractor&#x27;s on- base facilities upon reasonable notice or in case of emergency. (End of clause)</p></div>

<body><h2>247.372 DD Form 1654, Evaluation of Transportation Cost Factors.</h2>
<div class="body conbody"><p class="p">Contracting personnel may use the DD Form 1654 to furnish information to the transportation office for development of cost factors for use by the contracting officer in the evaluation of f.o.b. origin offers.</p></div>

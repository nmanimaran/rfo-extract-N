<body><h2>233.171 Reporting requirement for protests of solicitations or awards.</h2>
<div class="body conbody"><p class="p">Follow the procedures at PGI 233.171 for reporting information on protests involving the same contract award or proposed award that have been filed at both the GAO and the U.S. Court of Federal Claims.</p></div>

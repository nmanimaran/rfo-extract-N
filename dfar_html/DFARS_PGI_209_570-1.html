<body><h2>PGI 209.570-1 Definitions.</h2>
<div class="body conbody"><p class="p">The phrase “substantial portion of the work,” as used in the definition of “lead system integrator with system responsibility” in the clause at DFARS 252.209-7007, may relate to the dollar value of the effort or to the criticality of the effort to be performed.</p></div>

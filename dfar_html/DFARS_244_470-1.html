<body><h2>244.470-1 Contract clause.</h2>
<div class="body conbody"><p class="p">Insert the clause at 252.244-7999, Subcontracts for Commercial Products and Commercial Services, in solicitations and contracts, including solicitations and contracts using FAR part 12 procedures for the acquisition of commercial products and commercial services.</p></div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>216.101 Policies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .content table {
            white-space: normal;
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }
        .content table th,
        .content table td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: left;
            vertical-align: top;
        }
        .content table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>216.101 Policies</h1>
    <div class="content">Do not use a cost-reimbursement line item for the acquisition of production of major 
defense acquisition programs, unless the exception at 234.7202(b)(2) applies.  (Section 
811 of the National Defense Authorization Act for Fiscal Year 2013 (Pub. L. 112-239))</div>
</body>
</html>

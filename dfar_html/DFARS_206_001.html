<body><h2>206.001 Applicability.</h2>
<div class="body conbody"><p class="p">(b)  As authorized by 10 U.S.C. 1091, contracts awarded to individuals using the procedures at 237.201-1(ii) are exempt from the competition requirements of FAR Part 6.</p></div>

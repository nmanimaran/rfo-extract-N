<body><h2>231.205-19 Insurance and indemnification.</h2>
<div class="body conbody"><p class="p">(e)  In addition to the cost limitations in FAR 31.205-19(e), self-insurance and purchased insurance costs are subject to the requirements of the clauses at 252.217- 7012, Liability and Insurance, and 252.228-7001, Ground and Flight Risk.</p></div>

<body><h2>232.501-1 Customary progress payment rates.</h2>
<div class="body conbody"><p class="p">(a)  The customary progress payment rates for DoD contracts, including contracts that contain foreign military sales (FMS) requirements, are 80 percent for large business concerns and 90 percent for small business concerns.</p></div>

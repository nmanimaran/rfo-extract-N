<body><h2>252.225-7011 Restriction on Acquisition of Supercomputers.</h2>
<div class="body conbody"><p class="p">As prescribed in 225.7012-3, use the following clause: RESTRICTION ON ACQUISITION OF SUPERCOMPUTERS (JUN 2005) Supercomputers delivered under this contract shall be manufactured in the United States or its outlying areas. (End of clause)</p></div>

<body><h2>PGI 216.403-2 Performance incentives.</h2>
<div class="body conbody"><p class="p">Contractor performance incentives should relate to specific performance areas of milestones, such as delivery or test schedules, quality controls, maintenance requirements, and reliability standards.</p></div>

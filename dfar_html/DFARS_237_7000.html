<body><h2>237.7000 Scope.</h2>
<div class="body conbody"><p class="p">This subpart—</p>
<p class="p">(a)  Applies to contracts for mortuary services (the care of remains) for military personnel within the United States; and</p>
<p class="p">(b)  May be used as guidance in areas outside the United States for mortuary services for deceased military and civilian personnel.</p></div>

<body><h2>240.7004-4 Waiver of prohibition.</h2>
<div class="body conbody"><p class="p">The prohibition in paragraph (c) of this section may be waived if the Secretary of Defense determines that a waiver is not inconsistent with the national security objectives of the United States in accordance with 10 U.S.C. 4871(c).</p></div>

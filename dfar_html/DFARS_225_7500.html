<body><h2>225.7500 Scope of subpart.</h2>
<div class="body conbody"><p class="p">This subpart states policies and procedures implementing the Balance of Payments Program.  It applies to contracts for the acquisition of—</p>
<p class="p">(a) Supplies for use outside the United States; and</p>
<p class="p">(b) Construction to be performed outside the United States.</p></div>

<body><h2>217.7601 Provisioning.</h2>
<div class="body conbody"><p class="p">(a)  Follow the procedures at PGI 217.7601 for contracts with provisioning requirements.</p>
<p class="p">(b)  For technical requirements of provisioning, see DoD Manual 4140.01, Volume 2, DoD Supply Chain Materiel Management Procedures:  Demand and Supply Planning.</p></div>

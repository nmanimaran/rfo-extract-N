<body><h2>204.206 Contracting officer&#x27;s signature.</h2>
<div class="body conbody"><p class="p">A photocopy, facsimile, electronic, mechanically applied, and printed signature, seal, and date are considered an original signature, seal, and date.  Follow the procedures at PGI 204.206 for signature of contract documents.</p></div>

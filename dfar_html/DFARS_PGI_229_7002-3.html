<body><h2>PGI 229.7002-3 Value added tax or import duty problem resolution.</h2>
<div class="body conbody"><p class="p">If the contracting officer cannot resolve a value added tax or import duty problem, refer the issue to HQ Third Air Force, Staff Judge Advocate, 3af.ja@us.af.mil, DSN: 314-480-8992. Direct contact with HMRC in London is prohibited.</p></div>

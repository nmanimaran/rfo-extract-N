<body><h2>249.109-70 Limitation on pricing of the terminated effort.</h2>
<div class="body conbody"><p class="p">When there is a termination for convenience (partial or whole) or a change that reduces scope, follow the procedures at PGI 249.109-70 for limitation on pricing of the terminated or reduced effort.</p></div>

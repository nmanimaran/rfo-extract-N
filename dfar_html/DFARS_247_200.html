<body><h2>247.200 Scope of subpart.</h2>
<div class="body conbody"><p class="p">This subpart does not apply to the operation of vessels owned by, or bareboat chartered by, the Government.  See additional guidance at PGI 247.200 for procurement of transportation or related services. <strong>247.206  [Reserved] </strong></p></div>

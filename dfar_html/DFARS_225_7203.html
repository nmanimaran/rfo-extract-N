<body><h2>225.7203 Contracting officer distribution of reports.</h2>
<div class="body conbody"><p class="p">Follow the procedures at PGI 225.7203 for distribution of reports submitted with offers in accordance with the provision at 252.225-7003, Report of Intended Performance Outside the United States and Canada—Submission with Offer.</p></div>

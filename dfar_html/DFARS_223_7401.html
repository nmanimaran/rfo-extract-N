<body><h2>223.7401 Definition.</h2>
<div class="body conbody"><p class="p">As used in this subpart— <em>Ocean-going vessel</em> means a vessel over 59 feet in length owned or operated by DoD or the U.S. Coast Guard, other than vessels that are chartered by the Armed Forces on a time or voyage basis.</p></div>

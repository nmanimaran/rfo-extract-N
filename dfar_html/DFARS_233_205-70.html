<body><h2>233.205-70 Limitations on payment.</h2>
<div class="body conbody"><p class="p">See 10 U.S.C. 3862 for limitations on Congressionally directed payment of a claim under 41 U.S.C. chapter 71 (Contract Disputes), a request for equitable adjustment to contract terms, or a request for relief under Public Law 85-804.</p></div>

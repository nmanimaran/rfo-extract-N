<body><h2>225.7021-2 Restrictions.</h2>
<div class="body conbody"><p class="p">In accordance with section 855 of the National Defense Authorization Act for Fiscal Year 2022 (Pub. L. 117-81, 10 U.S.C. 4651 note prec.), do not award, extend, or exercise an option on a covered contract unless a covered entity has submitted each required disclosure.</p></div>

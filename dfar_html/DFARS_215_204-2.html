<body><h2>215.204-2 Competitive negotiations.</h2>
<div class="body conbody"><p class="p">(a)<em> General.</em><strong>  </strong>For acquisitions with an estimated value of $100 million or more, contracting officers should conduct negotiations.  Follow the procedures at FAR 15.204.<strong> </strong></p></div>

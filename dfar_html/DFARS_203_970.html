<body><h2>203.970 Contract clause.</h2>
<div class="body conbody"><p class="p">Insert the clause at 252.203-7002, Requirement to Inform Employees of Whistleblower Rights, in all solicitations and contracts, including solicitations and contracts using FAR part 12 procedures for the acquisition of commercial products or commercial services.</p></div>

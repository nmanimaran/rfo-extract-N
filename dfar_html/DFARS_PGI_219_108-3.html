<body><h2>PGI 219.108-3 Selecting acquisitions for the 8(a) Program.</h2>
<div class="body conbody"><p class="p">(1)  Contracting activities should respond to SBA requests for contract support within 30 calendar days after receipt.</p>
<p class="p">(2)  Before considering a small business set-aside, review the acquisition for offering under the 8(a) Program.</p></div>

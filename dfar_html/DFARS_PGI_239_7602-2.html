<body><h2>PGI 239.7602-2 Required storage of data within the United States or outlying areas.</h2>
<div class="body conbody"><p class="p">(b)  Prior to authorizing storage of data outside the United States and outlying areas, the contracting officer must receive written authorization from the authorizing official.</p></div>

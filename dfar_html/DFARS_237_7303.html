<body><h2>237.7303 Contract clauses.</h2>
<div class="body conbody"><p class="p">Contracts made directly with students are nonpersonal service contracts but must include the clauses at FAR 52.232-3, Payments Under Personal Services Contracts, and FAR 52.249-12, Termination (Personal Services).</p></div>

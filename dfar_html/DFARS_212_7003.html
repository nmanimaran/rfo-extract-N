<body><h2>212.7003 Limitations.</h2>
<div class="body conbody"><p class="p">Contracting officers must follow the procedures at PGI 212.7003 to obtain senior procurement executive approval to award a contract in excess of $100 million resulting from a CSO.</p></div>

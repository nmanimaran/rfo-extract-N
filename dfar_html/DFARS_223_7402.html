<body><h2>223.7402 Prohibition.</h2>
<div class="body conbody"><p class="p">Do not procure any fire-fighting agent that contains in excess of one part per billion perfluoroalkyl substances or polyfluoroalkyl substances. Procurements of fire-fighting agent for use solely onboard ocean-going vessels are exempt from this prohibition.</p></div>

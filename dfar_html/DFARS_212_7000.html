<body><h2>212.7000 Scope of subpart.</h2>
<div class="body conbody"><p class="p">This subpart implements 10 U.S.C. 3458 for the acquisition of innovative commercial products or commercial services through the use of a general solicitation known as a commercial solutions opening (CSO).</p></div>

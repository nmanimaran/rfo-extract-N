<body><h2>225.7201 Policy.</h2>
<div class="body conbody"><p class="p">10 U.S.C. 4603 requires offerors and contractors to notify DoD of any intention to perform any part of a DoD contract outside the United States and Canada that—</p>
<p class="p">(a)  Exceeds $900,000 in value; and</p>
<p class="p">(b)  Could be performed inside the United States or Canada.</p></div>

<body><h2>216.101 Policies.</h2>
<div class="body conbody"><p class="p">Do not use a cost-reimbursement line item for the acquisition of production of major defense acquisition programs, unless the exception at 234.7202(b)(2) applies.  (Section 811 of the National Defense Authorization Act for Fiscal Year 2013 (Pub. L. 112-239))</p></div>

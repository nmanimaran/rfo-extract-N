<body><h2>225.7009-3 Exception.</h2>
<div class="body conbody"><p class="p">The restriction in 225.7009-2 does not apply to contracts or subcontracts for the acquisition of commercial products, except for commercial ball and roller bearings acquired as end items.</p></div>

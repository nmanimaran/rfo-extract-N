<body><h2>203.901 Definitions.</h2>
<div class="body conbody"><p class="p">As used in this subpart— “Abuse of authority” means an arbitrary and capricious exercise of authority that is inconsistent with the mission of DoD or the successful performance of a DoD contract.</p></div>

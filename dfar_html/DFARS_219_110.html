<body><h2>219.110 Price evaluation preference for HUBZone small business concerns.</h2>
<div class="body conbody"><p class="p">(a)  In tiered evaluations, do not apply the price evaluation preference until a tier is reached where offers from other than small businesses are being considered.</p></div>

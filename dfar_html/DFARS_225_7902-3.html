<body><h2>225.7902-3 Policy.</h2>
<div class="body conbody"><p class="p">DoD will facilitate maximum use of the DTC Treaties by prospective contractors responding to DoD solicitations and by contractors eligible to export qualifying defense articles under DoD contracts in accordance with 22 CFR 126.16(g) and 22 CFR 126.17(g).</p></div>

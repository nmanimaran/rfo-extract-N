<body><h2>223.370-5 Contract clauses.</h2>
<div class="body conbody"><p class="p">Use the clauses at 252.223-7002, Safety Precautions for Ammunition and Explosives, and 252.223-7003, Change in Place of Performance—Ammunition and Explosives, in all solicitations and contracts for acquisition to which this section applies.</p></div>

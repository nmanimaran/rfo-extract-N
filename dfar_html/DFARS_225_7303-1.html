<body><h2>225.7303-1 Contractor sales to other foreign customers.</h2>
<div class="body conbody"><p class="p">If the contractor has made sales of the item required for the foreign military sale to foreign customers under comparable conditions, including quantity and delivery, price the FMS contract in accordance with FAR part 15.</p></div>

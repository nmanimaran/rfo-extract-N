<body><h2>PGI 225.871-5 Directed subcontracting.</h2>
<div class="body conbody"><p class="p">The cooperative project agreement is the authority for a contractual provision requiring the contractor to place certain subcontracts with particular subcontractors.  No separate justification and approval during the acquisition process is required.</p></div>

<body><h2>223.7200 Definition.</h2>
<div class="body conbody"><p class="p">As used in this subpart— <em>Arms, ammunition, and explosives (AA&amp;E)</em> means those items within the scope of DoD Manual 5100.76, Physical Security of Sensitive Conventional Arms, Ammunition, and Explosives.</p></div>

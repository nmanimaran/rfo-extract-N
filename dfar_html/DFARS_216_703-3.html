<body><h2>216.703-3 Limitations.</h2>
<div class="body conbody"><p class="p">The period during which orders may be placed against a basic ordering agreement may not exceed 5 years.</p>
<p class="p">(d)  Follow the procedures at PGI 216.703-3(d) for issuing orders under basic ordering agreements.</p></div>

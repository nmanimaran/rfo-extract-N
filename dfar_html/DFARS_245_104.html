<body><h2>245.104 Responsibility and liability for Government property.</h2>
<div class="body conbody"><p class="p">In addition to the contract types listed at FAR 45.104, contractors are not held liable for loss of Government property under negotiated fixed-price contracts awarded on a basis other than submission of certified cost or pricing data.</p></div>

<body><h2>237.7800 Scope of subpart.</h2>
<div class="body conbody"><p class="p">This subpart implements 10 U.S.C. 2387, which requires, under certain circumstances, the transfer of a contract working dog to the Department of the Air Force, 341st Training Squadron, for veterinary screening and care (10 U.S.C. 2583).</p></div>

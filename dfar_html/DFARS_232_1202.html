<body><h2>232.1202 Conditions for use.</h2>
<div class="body conbody"><p class="p">(a)  Individual orders may exceed the simplified acquisition threshold for—</p>
<p class="p" style="padding-left: 2em">(i)  Brand-name commercial product commissary resale subsistence; and</p>
<p class="p" style="padding-left: 2em">(ii)  Medical supplies for direct shipment overseas.</p></div>

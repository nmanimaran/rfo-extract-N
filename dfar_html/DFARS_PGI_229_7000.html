<body><h2>PGI 229.7000 Scope of subpart.</h2>
<div class="body conbody"><p class="p">This subpart prescribes procedures that contracting officers must use to obtain tax relief and duty-free import privileges when conducting U.S. Government acquisitions in certain foreign countries.</p></div>

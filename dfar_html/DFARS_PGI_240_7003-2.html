<body><h2>PGI 240.7003-2 Prohibitions.</h2>
<div class="body conbody"><p class="p">(a)(2)(i)  Contracting officers must obtain a copy of the determination from the requiring activity official performing program management responsibilities that the components and parts are themselves covered by the USML or the 600 series of the CCL.</p></div>

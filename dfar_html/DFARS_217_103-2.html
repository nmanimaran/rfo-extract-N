<body><h2>217.103-2 Procedures.</h2>
<div class="body conbody"><p class="p">(b)(1)(A)  Every multiyear contract must comply with FAR 17.103-2(b)(1), unless an exception is approved through the budget process in coordination with the cognizant comptroller.</p></div>

<body><h2>204.770-1 General.</h2>
<div class="body conbody"><p class="p">Under the U.S.-International Atomic Energy Agency Additional Protocol (U.S.- IAEA AP), the United States is required to declare a wide range of public and private nuclear-related activities to the IAEA and potentially provide access to IAEA inspectors for verification purposes.</p></div>

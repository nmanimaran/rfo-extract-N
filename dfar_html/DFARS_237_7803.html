<body><h2>237.7803 Procedures.</h2>
<div class="body conbody"><p class="p">Contracting officers, at the request of the requiring activity, may issue a determination that the service life of a contract working dog has terminated if the conditions in 237.7802(b) have been documented by the requiring activity.</p></div>

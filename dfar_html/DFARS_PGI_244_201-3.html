<body><h2>PGI 244.201-3 Contracting officer’s responsibilities.</h2>
<div class="body conbody"><p class="p">If subcontractor selection is not based on lowest price, assess if the contractor adequately justified selecting the subcontractor as offering the best value to the government.</p></div>

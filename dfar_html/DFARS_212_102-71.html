<body><h2>212.102-71 Only one offer.</h2>
<div class="body conbody"><p class="p">If only one offer is received in response to a competitive solicitation issued using simplified acquisition procedures for commercial products and commercial services, follow the procedures at 215.202-71.</p></div>

<body><h2>PGI 246.470-2 Quality evaluation data.</h2>
<div class="body conbody"><p class="p">Types of quality evaluation data are—</p>
<p class="p">(1)  Quality data developed by the contractor during performance;</p>
<p class="p">(2)  Data developed by the Government through contract quality assurance actions; and</p>
<p class="p">(3)  Reports by users and customers.</p></div>

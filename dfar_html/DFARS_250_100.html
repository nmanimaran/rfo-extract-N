<body><h2>250.100 Definitions.</h2>
<div class="body conbody"><p class="p">As used in this subpart— “Secretarial level” means—</p>
<p class="p">(1)  An official at or above the level of an Assistant Secretary (or Deputy) of Defense or of the Army, Navy, or Air Force; and</p>
<p class="p">(2)  A contract adjustment board established by the Secretary concerned.</p></div>

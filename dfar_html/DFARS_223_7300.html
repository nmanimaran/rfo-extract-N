<body><h2>223.7300 Definition.</h2>
<div class="body conbody"><p class="p">As used in this subpart— <em>Legacy system</em> means any program that has passed Milestone A in the defense acquisition management system, as defined in DoD Instruction 5000.02.</p></div>

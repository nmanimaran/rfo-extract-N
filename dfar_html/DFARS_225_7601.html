<body><h2>225.7601 Restriction.</h2>
<div class="body conbody"><p class="p">In accordance with 10 U.S.C. 4659, do not enter into a contract with a foreign entity unless it has certified that it does not comply with the secondary Arab boycott of Israel.</p></div>

<body><h2>225.600 Scope of subpart.</h2>
<div class="body conbody"><p class="p">This subpart prescribes the clauses that implement subparts 225.1 through 225.5 and 225.7 through 225.10.  The clauses that implement subparts 225.70 through 225.75 are prescribed within those subparts.</p></div>

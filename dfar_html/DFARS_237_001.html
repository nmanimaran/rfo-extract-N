<body><h2>237.001 Definition.</h2>
<div class="body conbody"><p class="p">As used in this subpart— “Nonprofit organization” means any organization that is—</p>
<p class="p">(1)  Described in Section 501(c) of the Internal Revenue Code of 1986; and</p>
<p class="p">(2)  Exempt from tax under Section 501(a) of that Code.</p></div>

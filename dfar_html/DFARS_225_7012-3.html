<body><h2>225.7012-3 Contract clause.</h2>
<div class="body conbody"><p class="p">Unless a waiver has been granted, insert the clause at 252.225-7011, Restriction on Acquisition of Supercomputers, in solicitations and contracts for the acquisition of supercomputers.</p></div>

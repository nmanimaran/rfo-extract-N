<div class="body conbody"><p class="p">(a)(1)  Except for aviation or ship critical safety items, obtain approval in accordance with PGI 209.202(a)(1) when establishing qualification requirements.  See 209.270 for approval of qualification requirements for aviation or ship critical safety items.</p></div>

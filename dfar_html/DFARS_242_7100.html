<body><h2>242.7100 General.</h2>
<div class="body conbody"><p class="p">A voluntary refund is a payment or credit (adjustment under one or more contracts or subcontracts) to the Government from a contractor or subcontractor that is not required by any contractual or other legal obligation.  Follow the procedures at PGI 242.7100 for voluntary refunds.</p></div>

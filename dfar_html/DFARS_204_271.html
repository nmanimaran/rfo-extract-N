<body><h2>204.271 Contract distribution.</h2>
<div class="body conbody"><p class="p">Contracting officers must distribute one signed copy or reproduction of the signed contract to the contractor, payment office, and all other entities on the contract distribution list.  See PGI 204.271 for guidance on the distribution of contracts and modifications.</p></div>

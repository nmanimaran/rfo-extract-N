<body><h2>223.7101 Definitions.</h2>
<div class="body conbody"><p class="p">As used in this subpart, the terms storage and toxic or hazardous materials are defined in the clause at 252.223-7006, Prohibition on Storage, Treatment, and Disposal of Toxic or Hazardous Materials.</p></div>

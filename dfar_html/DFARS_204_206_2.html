<body><h2>204.206 Contracting officer&#x27;s signature.</h2>
<div class="body conbody"><p class="p">(a)  Include the contracting officer&#x27;s telephone number and, when available, e- mail/Internet address on contracts and modifications.</p>
<p class="p">(b)  The contracting officer may sign bilateral modifications of a letter contract before signature by the contractor.</p></div>

<body><h2>225.7202 Exception.</h2>
<div class="body conbody"><p class="p">This subpart does not apply to contracts for commercial products, commercial services, construction, ores, natural gas, utilities, petroleum products and crudes, timber (logs), or subsistence.</p></div>

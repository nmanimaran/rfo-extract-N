<body><h2>240.7004-3 Notification.</h2>
<div class="body conbody"><p class="p">Forward any disclosure that the government of a country that is a state sponsor of terrorism has a significant interest in an offeror, a subsidiary of an offeror, or any other firm that owns or controls an offeror through agency channels to the address at PGI 240.7004-3.</p></div>

<body><h2>237.871-2 Definition.</h2>
<div class="body conbody"><p class="p">As used in this section— “Combatant commander,” “detainee,” and “personnel interacting with detainees,” as used in this section, are defined in the clause at 252.237-7998, Training for Contractor Personnel Interacting with Detainees.</p></div>

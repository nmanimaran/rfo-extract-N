<body><h2>PGI 222.104-1 General.</h2>
<div class="body conbody"><p class="p">The contract administration office must—</p>
<p class="p">(1)  Notify the labor advisor, the contracting officer, and the head of the contracting activity when interference is likely; and</p>
<p class="p">(2)  Disseminate information on labor disputes in accordance with departmental procedures.</p></div>
